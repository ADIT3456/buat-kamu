<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nyatakan Perasaan 💌</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #c9eaff 0%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      padding: 1rem;
    }
    .floating {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body>
  <div class="text-center bg-white/80 backdrop-blur-md p-8 sm:p-10 rounded-3xl shadow-2xl w-full max-w-sm floating border border-blue-200">
    <h1 class="text-2xl sm:text-3xl font-bold mb-4 text-blue-500">Hai Biruu  💙</h1>
    <p class="text-gray-700 mb-6 text-base sm:text-lg">Aku cuma mau bilang... Aku suka kamu mau ga jadi pacarku </p>

    <div class="flex justify-center gap-4 flex-wrap">
      <button id="yesBtn" class="bg-blue-500 text-white px-5 sm:px-6 py-2 rounded-xl shadow-md hover:scale-105 transition-transform duration-300">Iya 💖</button>
      <button id="noBtn" class="bg-blue-100 text-blue-600 px-5 sm:px-6 py-2 rounded-xl shadow-md">Tolak 🙈</button>
    </div>

    <p id="response" class="text-base sm:text-lg mt-6 font-semibold text-blue-600 hidden"></p>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const response = document.getElementById('response');

    yesBtn.addEventListener('click', () => {
      response.textContent = 'Yeeey! Akhirnya kita pacaran 💙🥰';
      response.classList.remove('hidden');
    });

    noBtn.addEventListener('mouseover', () => {
      const x = Math.random() * (window.innerWidth - noBtn.clientWidth);
      const y = Math.random() * (window.innerHeight - noBtn.clientHeight);
      noBtn.style.position = 'absolute';
      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
    });
  </script>
</body>
</html>
